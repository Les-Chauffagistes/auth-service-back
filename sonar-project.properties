sonar.projectKey=Les-Chauffagistes_auth-service-back
sonar.projectName=Auth Service Back
sonar.organization=les-chauffagistes

sonar.sources=src,main.py,init.py
sonar.tests=tests
sonar.python.version=3

sonar.python.coverage.reportPaths=coverage.xml
# Thin aiohttp route handlers: mostly parameter parsing + delegation to services,
# which are covered by dedicated unit/integration tests. Not worth the aiohttp
# test-client scaffolding for what would largely be tests of the framework glue.
sonar.coverage.exclusions=src/v1/handlers/**

sonar.cpd.exclusions=tests/**